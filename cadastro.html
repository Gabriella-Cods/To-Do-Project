<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Lista Diária</title>
    <link rel="stylesheet" href="styles/cadastro.css">
</head>
<body class="fundo-bonito2">
    <div class="container-form">
        <h2 class="titulo-form">Criar Conta</h2>
        <form id="formulario-cadastro">
            <input type="text" id="nome" placeholder="Nome Completo" class="input-padrao">
            <input type="email" id="email" placeholder="Seu melhor e-mail" class="input-padrao">
            <input type="password" id="senha" placeholder="Crie uma senha" class="input-padrao">
            <button type="submit" id="botao" class="btn-cadastro2">Finalizar Cadastro</button>
        </form>
        <div class="rodape-form">
            <a href="telainicial.html" class="link-voltar">← Voltar</a>
        </div>
        
    </div>

    <script src="/javascript/javascript.js"></script>
</body>
</html>
